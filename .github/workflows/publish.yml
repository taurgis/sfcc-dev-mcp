name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release package
    if: >-
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Create release pull request or publish package
        id: changesets
        uses: changesets/action@v1
        with:
          commit: 'chore: release package'
          title: 'chore: release package'
          createGithubReleases: true
          version: npm run version-packages
          publish: npm run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'

      - name: Read published package version
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "PACKAGE_VERSION=$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).version')" >> "$GITHUB_ENV"

      - name: Wait for npm propagation buffer
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Waiting 120 seconds for npm registry/CDN propagation before post-publish tests..."
          sleep 120

      - name: Setup SFCC mock server
        if: steps.changesets.outputs.published == 'true'
        run: |
          cd tests/servers/sfcc-mock-server
          npm install
          npm run setup:logs
          node server.js --port 3000 &
          sleep 5

      - name: Run post-publish MCP tests against published NPX package
        if: steps.changesets.outputs.published == 'true'
        run: bash ./scripts/test-published-npx.sh "$PACKAGE_VERSION"

      - name: Stop SFCC mock server
        if: always() && steps.changesets.outputs.published == 'true'
        run: |
          pkill -f "node.*server.js" || true
          lsof -ti :3000 | xargs kill -9 2>/dev/null || true

      - name: Install MCP Publisher
        if: steps.changesets.outputs.published == 'true'
        run: |
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          PUBLISHER_URL="https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz"

          curl --fail --silent --show-error --location "$PUBLISHER_URL" --output mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          rm -f mcp-publisher.tar.gz

      - name: Validate server.json
        if: steps.changesets.outputs.published == 'true'
        run: npm run validate:server-json

      - name: Login to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        run: ./mcp-publisher publish

      - name: Summarize release result
        env:
          PUBLISHED: ${{ steps.changesets.outputs.published }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          {
            echo '### Release result'
            echo ''
            echo "- Published packages: ${PUBLISHED:-false}"
            if [[ "${PUBLISHED}" == 'true' && -n "${PUBLISHED_PACKAGES}" ]]; then
              echo "- Published packages JSON: ${PUBLISHED_PACKAGES}"
              echo "- MCP registry publish completed for version ${PACKAGE_VERSION}."
            else
              echo '- Release pull request created or updated when unreleased changesets were present.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
